<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Copy Links</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
        min-width: 240px;
      }
      button.action {
        display: block;
        width: 100%;
        margin: 6px 0;
        padding: 10px;
        font-size: 14px;
      }
      #status {
        margin-top: 8px;
        font-size: 13px;
        color: #333;
      }
      textarea {
        width: 100%;
        height: 120px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header h3 {
        margin: 0;
      }
      #settingsBtn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        padding: 4px;
        line-height: 1;
        color: #555;
      }
      #settingsBtn:hover {
        color: #000;
      }
      #settingsPanel {
        display: none;
        margin: 8px 0;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #f9f9f9;
      }
      #settingsPanel label {
        font-size: 13px;
        margin-right: 8px;
      }
      #langSelect {
        font-size: 13px;
        padding: 2px 4px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h3 data-i18n="heading">リンクをコピー</h3>
      <button id="settingsBtn" title="設定">&#9881;</button>
    </div>
    <div id="settingsPanel">
      <label data-i18n="languageLabel">言語</label>
      <select id="langSelect">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </div>
    <button id="copyTabs" class="action" data-i18n="copyAllTabs">全タブのURLをコピー</button>
    <button id="copySelectedTabs" class="action" data-i18n="copySelectedTabs">選択中のタブのURLをコピー</button>
    <button id="qiita" class="action" data-i18n="copyQiita">Qiitaリンクをコピー</button>
    <div id="status"></div>
    <div id="fallback" style="display: none; margin-top: 8px">
      <p data-i18n="fallbackInstruction">以下のリンクを手動でコピーしてください：</p>
      <textarea id="fallbackText" readonly></textarea>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
